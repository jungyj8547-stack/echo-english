<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoEnglish — AI 영어 회화 분석</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #17171c;
    --surface2: #1f1f27;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #8a8794;
    --text3: #5a5765;
    --accent: #c8f064;
    --accent2: #a8d444;
    --red: #ff5e5e;
    --red-bg: rgba(255,94,94,0.1);
    --green: #64f0a8;
    --green-bg: rgba(100,240,168,0.1);
    --purple: #a78bfa;
    --purple-bg: rgba(167,139,250,0.1);
    --amber: #fbbf24;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 1.25rem 4rem;
  }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── Header ── */
  header {
    padding: 2.5rem 0 2rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .logo-sub {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  /* ── API Key section ── */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .api-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .api-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--accent); }
  .api-input::placeholder { color: var(--text3); }
  .api-save-btn {
    padding: 9px 16px;
    background: var(--accent);
    color: #0e0e11;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .api-save-btn:hover { background: var(--accent2); }
  .api-status { font-size: 12px; color: var(--text3); margin-top: 6px; }
  .api-status.ok { color: var(--green); }

  /* ── Mic area ── */
  .mic-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 0 2rem;
    gap: 1.25rem;
  }

  .mic-ring {
    position: relative;
    width: 120px;
    height: 120px;
  }
  .mic-ring-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .mic-ring-bg { fill: none; stroke: var(--border); stroke-width: 2; }
  .mic-ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 339.3;
    stroke-dashoffset: 339.3;
    transition: stroke-dashoffset 1s linear;
  }
  .mic-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    outline: none;
  }
  .mic-btn:hover { background: var(--surface); border-color: var(--accent); }
  .mic-btn.recording {
    background: var(--red-bg);
    border-color: var(--red);
    animation: mic-pulse 1.5s ease-in-out infinite;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,94,94,0.3); }
    50% { box-shadow: 0 0 0 16px rgba(255,94,94,0); }
  }
  .mic-icon {
    width: 32px; height: 32px;
    color: var(--text2);
    transition: color 0.2s;
  }
  .mic-btn.recording .mic-icon { color: var(--red); }
  .mic-btn:hover .mic-icon { color: var(--accent); }

  .mic-label {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-align: center;
  }
  .mic-label.active { color: var(--red); }

  .timer {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: var(--text);
    letter-spacing: -1px;
    display: none;
  }
  .timer.active { display: block; }

  /* ── Waveform ── */
  .waveform {
    display: none;
    align-items: flex-end;
    gap: 4px;
    height: 36px;
  }
  .waveform.active { display: flex; }
  .wbar {
    width: 4px;
    background: var(--accent);
    border-radius: 2px;
    animation: wv 0.7s ease-in-out infinite;
    opacity: 0.8;
  }
  .wbar:nth-child(1) { animation-delay: 0s; }
  .wbar:nth-child(2) { animation-delay: 0.08s; }
  .wbar:nth-child(3) { animation-delay: 0.16s; }
  .wbar:nth-child(4) { animation-delay: 0.24s; }
  .wbar:nth-child(5) { animation-delay: 0.32s; }
  .wbar:nth-child(6) { animation-delay: 0.18s; }
  .wbar:nth-child(7) { animation-delay: 0.06s; }
  .wbar:nth-child(8) { animation-delay: 0.28s; }
  @keyframes wv {
    0%, 100% { height: 6px; }
    50% { height: 32px; }
  }

  /* ── STT preview ── */
  .stt-preview {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.25rem;
    font-size: 15px;
    color: var(--text2);
    line-height: 1.7;
    min-height: 60px;
    font-style: italic;
    transition: all 0.2s;
  }
  .stt-preview.has-text {
    color: var(--text);
    font-style: normal;
    border-color: var(--border2);
  }

  /* ── Stop / Analyze button ── */
  .action-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .stop-btn {
    padding: 14px 20px;
    background: var(--red-bg);
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .stop-btn.active { display: flex; }
  .stop-btn:hover { background: rgba(255,94,94,0.2); }

  .analyze-btn {
    flex: 1;
    padding: 14px;
    background: var(--accent);
    color: #0e0e11;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .analyze-btn:hover { background: var(--accent2); }
  .analyze-btn:disabled {
    background: var(--surface2);
    color: var(--text3);
    cursor: not-allowed;
  }

  .error-msg {
    font-size: 13px;
    color: var(--red);
    background: var(--red-bg);
    border-radius: 10px;
    padding: 9px 14px;
    display: none;
    width: 100%;
    text-align: center;
  }
  .error-msg.active { display: block; }

  /* ── History ── */
  .history-section { margin-top: 2rem; }
  .section-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }
  .history-empty {
    font-size: 14px;
    color: var(--text3);
    text-align: center;
    padding: 2rem;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
  }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .history-item:hover { border-color: var(--border2); background: var(--surface2); }
  .history-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    opacity: 0.6;
  }
  .history-body { flex: 1; min-width: 0; }
  .history-date { font-size: 11px; color: var(--text3); }
  .history-preview { font-size: 13px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-arrow { color: var(--text3); font-size: 18px; }

  /* ── Loading ── */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 1.5rem;
  }
  .loading-orb {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
  }
  .loading-step { font-size: 14px; color: var(--text3); }
  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(4) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }

  /* ── Result ── */
  .result-screen { padding-top: 0.5rem; }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem 0 1.5rem;
    transition: color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .back-btn:hover { color: var(--accent); }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 12px;
  }
  .result-card-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .result-card-title-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-amber { background: var(--amber); }
  .dot-red { background: var(--red); }
  .dot-green { background: var(--green); }
  .dot-purple { background: var(--purple); }

  .original-text {
    font-size: 16px;
    color: var(--text);
    line-height: 1.8;
  }

  .grammar-item {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .grammar-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .err-line {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: var(--red-bg);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 6px;
    font-size: 14px;
    color: var(--red);
    line-height: 1.5;
  }
  .fix-line {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: var(--green-bg);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 6px;
    font-size: 14px;
    color: var(--green);
    line-height: 1.5;
  }
  .err-fix-icon { flex-shrink: 0; margin-top: 1px; }
  .reason-text { font-size: 13px; color: var(--text3); line-height: 1.6; padding: 0 4px; }
  .no-error {
    font-size: 14px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .alt-item {
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    line-height: 1.6;
  }
  .alt-item:last-child { margin-bottom: 0; }
  .alt-num { font-size: 11px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.05em; }
  .alt-sent { font-size: 15px; color: var(--text); }

  .vocab-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .vocab-item:last-child { border-bottom: none; }
  .vocab-word { font-size: 15px; font-weight: 500; color: var(--purple); }
  .vocab-mean { font-size: 13px; color: var(--text3); text-align: right; }

  .next-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #0e0e11;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .next-btn:hover { background: var(--accent2); }

  /* ── Divider ── */
  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- ──────── MAIN SCREEN ──────── -->
  <div class="screen active" id="screen-main">
    <header>
      <div>
        <div class="logo-sub">AI English Coach</div>
        <div class="logo">Echo<span>English</span></div>
      </div>
    </header>

    <!-- Mic area -->
    <div class="mic-area">
      <div class="mic-ring">
        <svg class="mic-ring-svg" viewBox="0 0 120 120">
          <circle class="mic-ring-bg" cx="60" cy="60" r="54"/>
          <circle class="mic-ring-progress" id="ring-progress" cx="60" cy="60" r="54"/>
        </svg>
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()" aria-label="녹음 시작/중지">
          <svg class="mic-icon" id="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
      </div>

      <div class="waveform" id="waveform">
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
        <div class="wbar"></div><div class="wbar"></div>
      </div>

      <div class="timer" id="timer">0:00</div>

      <p class="mic-label" id="mic-label">마이크 버튼을 눌러 영어로 말하세요</p>

      <div class="stt-preview" id="stt-preview">인식된 내용이 여기에 표시됩니다...</div>

      <div class="error-msg" id="error-msg"></div>

      <div class="action-row">
        <button class="stop-btn" id="stop-btn" onclick="stopMic()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          완료
        </button>
        <button class="analyze-btn" id="analyze-btn" onclick="startAnalysis()" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg>
          분석 시작
        </button>
      </div>
    </div>

    <hr class="divider">

    <!-- History -->
    <div class="history-section">
      <div class="section-title">학습 기록</div>
      <div id="history-list">
        <div class="history-empty">아직 분석 기록이 없어요.<br>첫 번째 문장을 말해보세요!</div>
      </div>
    </div>
  </div>

  <!-- ──────── LOADING SCREEN ──────── -->
  <div class="screen" id="screen-loading">
    <div class="loading-screen">
      <div class="loading-orb"></div>
      <div class="loading-title">분석 중</div>
      <div class="loading-step" id="loading-step">문법 오류 확인 중<span class="loading-dots"></span></div>
    </div>
  </div>

  <!-- ──────── RESULT SCREEN ──────── -->
  <div class="screen" id="screen-result">
    <div class="result-screen">
      <button class="back-btn" onclick="goHome()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        홈으로
      </button>

      <div class="result-card">
        <div class="result-card-title"><span class="result-card-title-dot dot-amber"></span>내가 말한 문장</div>
        <p class="original-text" id="result-original"></p>
      </div>

      <div class="result-card">
        <div class="result-card-title"><span class="result-card-title-dot dot-red"></span>문법 교정</div>
        <div id="result-grammar"></div>
      </div>

      <div class="result-card">
        <div class="result-card-title"><span class="result-card-title-dot dot-green"></span>이렇게 말하면 더 자연스러워요</div>
        <div id="result-alts"></div>
      </div>

      <div class="result-card">
        <div class="result-card-title"><span class="result-card-title-dot dot-purple"></span>오늘의 단어장</div>
        <div id="result-vocab"></div>
      </div>

      <button class="next-btn" onclick="goHome()">다음 문장 연습하기</button>
    </div>
  </div>

</div>

<script>
let recognition = null;
let isRecording = false;
let timerInterval = null;
let seconds = 0;
let currentText = '';
let sessionHistory = [];
let apiKey = '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
';

// ── Screens ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function goHome() {
  currentText = '';
  updateSttPreview('');
  document.getElementById('analyze-btn').disabled = true;
  showScreen('main');
}

// ── Mic ──
function toggleMic() {
  isRecording ? stopMic() : startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showError('이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 또는 Edge를 사용해주세요.');
    return;
  }

  hideError();
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalText = '';

  recognition.onstart = () => {
    isRecording = true;
    seconds = 0;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('waveform').classList.add('active');
    document.getElementById('timer').classList.add('active');
    document.getElementById('stop-btn').classList.add('active');
    document.getElementById('mic-label').textContent = '듣고 있어요... 영어로 말하세요';
    document.getElementById('mic-label').classList.add('active');
    updateSttPreview('듣고 있어요...');

    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
      // Ring progress (max 180s)
      const pct = Math.min(seconds / 180, 1);
      const offset = 339.3 * (1 - pct);
      document.getElementById('ring-progress').style.strokeDashoffset = offset;
      if (seconds >= 180) stopMic();
    }, 1000);
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    const combined = (finalText + interim).trim();
    currentText = combined;
    updateSttPreview(combined || '듣고 있어요...');
    document.getElementById('analyze-btn').disabled = combined.length < 3;
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') {
      showError('소리가 감지되지 않았습니다. 다시 녹음해 주세요.');
    } else if (e.error === 'not-allowed') {
      showError('마이크 권한이 거부되었습니다. 브라우저 설정에서 마이크를 허용해주세요.');
    } else {
      showError('오류가 발생했습니다: ' + e.error);
    }
    stopMic();
  };

  recognition.onend = () => {
    if (isRecording) recognition.start();
  };

  recognition.start();
}

function stopMic() {
  if (!isRecording && !recognition) return;
  isRecording = false;
  if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
  clearInterval(timerInterval);

  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('waveform').classList.remove('active');
  document.getElementById('timer').classList.remove('active');
  document.getElementById('stop-btn').classList.remove('active');
  document.getElementById('mic-label').classList.remove('active');
  document.getElementById('mic-label').textContent = '마이크 버튼을 눌러 영어로 말하세요';
  document.getElementById('ring-progress').style.strokeDashoffset = 339.3;
  document.getElementById('timer').textContent = '0:00';

  if (!currentText) {
    showError('소리가 감지되지 않았습니다. 다시 녹음해 주세요.');
  }
}

function updateSttPreview(text) {
  const el = document.getElementById('stt-preview');
  if (!text || text === '인식된 내용이 여기에 표시됩니다...') {
    el.textContent = '인식된 내용이 여기에 표시됩니다...';
    el.classList.remove('has-text');
  } else {
    el.textContent = text;
    el.classList.add('has-text');
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('active');
}
function hideError() {
  document.getElementById('error-msg').classList.remove('active');
}

// ── Analysis ──
async function startAnalysis() {
  if (!currentText || currentText.length < 3) return;
  if (isRecording) stopMic();

  showScreen('loading');
  const steps = ['음성 텍스트 정제 중...', '문법 오류 분석 중...', '원어민 표현 검색 중...', '단어장 추출 중...', '리포트 정리 중...'];
  let si = 0;
  const stepEl = document.getElementById('loading-step');
  stepEl.textContent = steps[0];
  const iv = setInterval(() => { si = (si + 1) % steps.length; stepEl.textContent = steps[si]; }, 1400);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are an expert English coach for Korean learners. Analyze the given English and respond ONLY with valid JSON, no markdown fences, no preamble. Schema:
{"original":"...","grammar":[{"error":"...","fixed":"...","reason_ko":"..."}],"alternatives":[{"label":"...","sentence":"..."}],"vocabulary":[{"word":"...","meaning_ko":"..."}]}
- grammar: up to 3 errors (시제/전치사/단복수 등). Use empty array [] if no errors.
- alternatives: 2-3 natural native-speaker rewrites. Label: "자연스러운 표현 1" etc.
- vocabulary: 3-5 key words/phrases with Korean meaning.`,
        messages: [{ role: 'user', content: `Analyze this English: "${currentText}"` }]
      })
    });

    clearInterval(iv);

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API 오류');
    }

    const data = await res.json();
    const raw = data.content.map(i => i.text || '').join('');
    const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    renderResult(parsed, currentText);
    saveHistory(parsed, currentText);
  } catch (e) {
    clearInterval(iv);
    showScreen('main');
    showError('분석 오류: ' + e.message);
  }
}

// ── Render Result ──
function renderResult(d, orig) {
  document.getElementById('result-original').textContent = d.original || orig;

  const gEl = document.getElementById('result-grammar');
  if (!d.grammar || d.grammar.length === 0) {
    gEl.innerHTML = `<div class="no-error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      문법 오류가 없어요! 훌륭해요.
    </div>`;
  } else {
    gEl.innerHTML = d.grammar.map(g => `
      <div class="grammar-item">
        <div class="err-line">
          <svg class="err-fix-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          ${g.error}
        </div>
        <div class="fix-line">
          <svg class="err-fix-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          ${g.fixed}
        </div>
        <div class="reason-text">${g.reason_ko}</div>
      </div>`).join('');
  }

  document.getElementById('result-alts').innerHTML = d.alternatives.map(a => `
    <div class="alt-item">
      <div class="alt-num">${a.label}</div>
      <div class="alt-sent">${a.sentence}</div>
    </div>`).join('');

  document.getElementById('result-vocab').innerHTML = d.vocabulary.map(v => `
    <div class="vocab-item">
      <span class="vocab-word">${v.word}</span>
      <span class="vocab-mean">${v.meaning_ko}</span>
    </div>`).join('');

  showScreen('result');
}

// ── History ──
function saveHistory(d, orig) {
  const now = new Date();
  const label = (now.getMonth()+1) + '/' + now.getDate() + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
  sessionHistory.unshift({ date: label, preview: orig, data: d });
  renderHistoryList();
}

function renderHistoryList() {
  const el = document.getElementById('history-list');
  if (sessionHistory.length === 0) {
    el.innerHTML = '<div class="history-empty">아직 분석 기록이 없어요.<br>첫 번째 문장을 말해보세요!</div>';
    return;
  }
  el.innerHTML = sessionHistory.map((item, i) => `
    <div class="history-item" onclick="replayResult(${i})">
      <div class="history-dot"></div>
      <div class="history-body">
        <div class="history-date">${item.date}</div>
        <div class="history-preview">${item.preview}</div>
      </div>
      <span class="history-arrow">›</span>
    </div>`).join('');
}

function replayResult(i) {
  const item = sessionHistory[i];
  renderResult(item.data, item.preview);
}

// ── Init ──
renderHistoryList();
</script>
</body>
</html>
